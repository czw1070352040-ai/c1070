<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #252540;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #d4a843;
            --accent2: #b8860b;
            --tag-bg: #2a2a3c;
            --tag-text: #c0c0d0;
            --success: #4caf84;
            --danger: #e0556a;
            --border: #30304a;
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.5;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: 2px;
            font-weight: 700;
        }
        header p {
            color: var(--text-secondary);
            margin-top: 8px;
        }
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }
        .btn-accent {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            border-color: var(--accent);
        }
        .btn-accent:hover {
            background: var(--accent2);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover {
            background: var(--accent);
            color: #000;
        }
        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            color: var(--accent);
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0 25px;
        }
        .tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }
        .product-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid var(--border);
            transition: transform 0.15s, box-shadow 0.2s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }
        .product-card h3 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 6px;
        }
        .product-card .model {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .product-card .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .badge {
            background: #2a3040;
            color: #b0c0d0;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .badge.wireless { background: #2d4a3e; color: #8de0b0; }
        .badge.wired { background: #4a3a2d; color: #e0b88d; }
        .badge.anc { background: #3a2d4a; color: #c8a0e0; }
        .detail-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            border: 1px solid var(--border);
        }
        .detail-header {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-bottom: 25px;
        }
        .detail-img {
            width: 200px;
            height: 200px;
            background: var(--surface2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border: 1px dashed var(--border);
        }
        .detail-title h2 {
            font-size: 1.8rem;
            color: #fff;
        }
        .detail-title .model-name {
            color: var(--accent);
            font-size: 1.2rem;
            margin: 5px 0;
        }
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .spec-table th, .spec-table td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .spec-table th {
            background: var(--surface2);
            color: var(--accent);
            width: 150px;
            font-weight: 600;
        }
        .spec-table td {
            color: #d0d0e0;
        }
        .back-btn {
            margin-bottom: 20px;
            display: inline-block;
        }
        .quiz-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid var(--accent);
        }
        .quiz-question {
            font-size: 1.15rem;
            margin-bottom: 20px;
            color: #fff;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .quiz-option {
            background: var(--surface2);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }
        .quiz-option:hover {
            border-color: var(--accent);
        }
        .quiz-option.selected {
            border-color: var(--accent);
            background: #2a2a18;
        }
        .quiz-option.correct {
            border-color: var(--success);
            background: #1a3a2a;
        }
        .quiz-option.incorrect {
            border-color: var(--danger);
            background: #3a1a1a;
        }
        .quiz-feedback {
            margin-top: 10px;
            font-weight: 600;
            font-size: 1rem;
        }
        .hidden {
            display: none !important;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .fade-in {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mt-3 { margin-top: 16px; }
        .mb-3 { margin-bottom: 16px; }
    </style>
</head>

    <div id="page-list" class="page">

        <h2 id="list-title" style="color:#fff; margin-bottom:20px;"></h2>

        <button class="btn btn-outline back-btn" onclick="goHome()">← 返回首页</button>
        <div class="quiz-container" id="quiz-area"></div>
    </div>
</div>

// 辅助：根据标签筛选
function filterByTag(tag) {
    return products.filter(p => {
        const allText = JSON.stringify(p).toLowerCase();
        return allText.includes(tag.toLowerCase()) ||
               p.tags?.some(t => t.toLowerCase().includes(tag.toLowerCase())) ||
               p.features?.some(f => f.toLowerCase().includes(tag.toLowerCase())) ||
               p.connection?.toLowerCase().includes(tag.toLowerCase()) ||
               p.series?.toLowerCase() === tag.toLowerCase();
    });
}

// 页面切换
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0,0);
}

function goHome() {
    showPage('page-home');
    document.getElementById('list-title').textContent = '';
    document.getElementById('product-list').innerHTML = '';
}

let currentListFilter = null; // 存储当前列表筛选条件

function showListPage(title, filteredProducts) {
    showPage('page-list');
    document.getElementById('list-title').textContent = title;
    const grid = document.getElementById('product-list');
    grid.innerHTML = '';
    if(filteredProducts.length === 0) {
        grid.innerHTML = '<p style="color:#a0a0b8;">没有找到匹配的产品。</p>';
        return;
    }
    filteredProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <h3>${p.model}</h3>
            <div class="model">${p.series} 系列</div>
            <div class="badges">
                ${(p.tags||[]).slice(0,3).map(t => `<span class="badge">${t}</span>`).join('')}
            </div>
        `;
        card.onclick = () => showDetail(p);
        grid.appendChild(card);
    });
    currentListFilter = filteredProducts; // 保存以便返回
}

    const specRows = [

        ['频响范围', product.freq || '暂无'],
        ['阻抗', product.impedance || '暂无'],
        ['灵敏度', product.sensitivity || '暂无'],
        ['续航/电池', product.battery || '暂无'],

// ==================== 出题系统 ====================
function generateQuestions() {
    const questions = [];
    // 单选题：挖空参数
    const singleChoiceModels = products.filter(p => p.driver && p.battery && p.weight && p.model);
    for (let i = 0; i < 10; i++) {
        const p = singleChoiceModels[Math.floor(Math.random() * singleChoiceModels.length)];
        const fields = [
            {key:'driver', label:'驱动单元'},
            {key:'battery', label:'续航/电池'},
            {key:'weight', label:'重量'},
            {key:'impedance', label:'阻抗'},
            {key:'sensitivity', label:'灵敏度'},
            {key:'cable', label:'线长'},
            {key:'connection', label:'连接方式'}
        ].filter(f => p[f.key] && p[f.key] !== '暂无');
        if (fields.length === 0) continue;
        const chosen = fields[Math.floor(Math.random() * fields.length)];
        const correctAnswer = p[chosen.key];
        // 生成错误选项：从其他产品中随机取该字段值
        const otherValues = [...new Set(products.filter(op => op[chosen.key] && op[chosen.key] !== correctAnswer && op[chosen.key] !== '暂无').map(op => op[chosen.key]))];
        const shuffled = otherValues.sort(() => Math.random() - 0.5).slice(0, 3);
        const options = [...shuffled, correctAnswer].sort(() => Math.random() - 0.5);
        questions.push({
            type: 'single',
            question: `${p.model} 的 ${chosen.label} 是多少？`,
            options,
            answer: correctAnswer,
            explanation: `${p.model} 的 ${chosen.label} 为 ${correctAnswer}。`
        });
    }
    // 多选题：选出所有符合特征的型号
    const multiFeatures = [
        {text:'支持四模连接', filter: p => p.connection && p.connection.includes('四模')},
        {text:'带有7.1环绕音效', filter: p => p.tags?.includes('7.1环绕') || p.features?.some(f=>f.includes('7.1'))},
        {text:'支持主动降噪(ANC)', filter: p => p.features?.some(f=>f.includes('ANC')||f.includes('主动降噪'))},
        {text:'采用50mm驱动单元', filter: p => p.driver && p.driver.includes('50mm')},
        {text:'属于S21系列', filter: p => p.series === 'S21'},
        {text:'无线连接且续航超过100小时', filter: p => p.battery && (p.battery.includes('149h')||p.battery.includes('170h')||p.battery.includes('145h')||p.battery.includes('135h')||p.battery.includes('110h')||p.battery.includes('106h'))},
        {text:'是入耳式耳机', filter: p => p.tags?.includes('入耳式')},
        {text:'有猫耳外观', filter: p => p.tags?.includes('猫耳')},
        {text:'属于K系列', filter: p => ['K02','K03','K9'].includes(p.series)},
        {text:'重量小于250g', filter: p => p.weight && parseFloat(p.weight) < 250}
    ];
    for (let mf of multiFeatures) {
        const correctModels = products.filter(mf.filter).map(p => p.model);
        if (correctModels.length < 2) continue;
        // 生成干扰项：从不符的型号中随机选2-3个
        const incorrectModels = products.filter(p => !mf.filter(p)).map(p => p.model);
        const distractors = incorrectModels.sort(() => Math.random() - 0.5).slice(0, Math.min(3, incorrectModels.length));
        const allOptions = [...correctModels, ...distractors].sort(() => Math.random() - 0.5);
        questions.push({
            type: 'multi',
            question: `以下哪些型号 ${mf.text}？（多选）`,
            options: allOptions,
            answer: correctModels,
            explanation: `符合条件的型号：${correctModels.join('、')}`
        });
    }
    return questions.sort(() => Math.random() - 0.5).slice(0, 12);
}

let currentQuiz = [];
let currentIndex = 0;
let userAnswers = [];

function startQuiz() {
    currentQuiz = generateQuestions();
    currentIndex = 0;
    userAnswers = new Array(currentQuiz.length).fill(null);
    showPage('page-quiz');
    renderQuiz();
}

function renderQuiz() {
    const area = document.getElementById('quiz-area');
    if (currentIndex >= currentQuiz.length) {
        // 计算得分
        let score = 0;
        currentQuiz.forEach((q, i) => {
            const ua = userAnswers[i];
            if (!ua) return;
            if (q.type === 'single' && ua === q.answer) score++;
            if (q.type === 'multi' && Array.isArray(ua) && arraysEqual(ua.sort(), q.answer.sort())) score++;
        });
        area.innerHTML = `
            <h3 style="color:var(--accent);">测验完成！</h3>
            <p>你的得分：${score} / ${currentQuiz.length}</p>
            <button class="btn btn-accent mt-3" onclick="reviewQuiz()">查看答案</button>
            <button class="btn mt-3" onclick="startQuiz()">重新出题</button>
        `;
        return;
    }
    const q = currentQuiz[currentIndex];
    let optionsHtml = '';
    if (q.type === 'single') {
        optionsHtml = q.options.map((opt, idx) => `
            <div class="quiz-option" id="opt-${idx}" onclick="selectSingle('${opt}')">${opt}</div>
        `).join('');
    } else {
        const selected = userAnswers[currentIndex] || [];
        optionsHtml = q.options.map((opt, idx) => `
            <div class="quiz-option ${selected.includes(opt)?'selected':''}" id="opt-${idx}" onclick="toggleMulti('${opt}')">${opt}</div>
        `).join('');
    }
    area.innerHTML = `
        <h3 style="color:#fff;">第 ${currentIndex+1} / ${currentQuiz.length} 题</h3>
        <div class="quiz-question">${q.question}</div>
        <div class="quiz-options">${optionsHtml}</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="prevQuestion()" ${currentIndex===0?'disabled':''}>上一题</button>
            <button class="btn btn-accent" onclick="nextQuestion()">下一题</button>
            ${q.type === 'multi' ? '<button class="btn btn-outline" onclick="submitMulti()">提交答案</button>' : ''}
        </div>
        <div class="quiz-feedback" id="feedback"></div>
    `;
}

function selectSingle(val) {
    userAnswers[currentIndex] = val;
    document.querySelectorAll('.quiz-option').forEach(el => el.classList.remove('selected'));
    event.target.classList.add('selected');
    // 自动下一题
    setTimeout(() => nextQuestion(), 300);
}

function toggleMulti(val) {
    if (!userAnswers[currentIndex]) userAnswers[currentIndex] = [];
    const arr = userAnswers[currentIndex];
    if (arr.includes(val)) {
        userAnswers[currentIndex] = arr.filter(v => v !== val);
    } else {
        userAnswers[currentIndex] = [...arr, val];
    }
    renderQuiz();
}

function submitMulti() {
    const q = currentQuiz[currentIndex];
    const userSel = userAnswers[currentIndex] || [];
    const feedback = document.getElementById('feedback');
    if (arraysEqual(userSel.sort(), q.answer.sort())) {
        feedback.innerHTML = '<span style="color:var(--success);">✔ 回答正确！</span> ' + q.explanation;
    } else {
        feedback.innerHTML = '<span style="color:var(--danger);">✘ 回答错误。</span> ' + q.explanation;
    }
    // 禁用选项
    document.querySelectorAll('.quiz-option').forEach(el => el.style.pointerEvents = 'none');
}

function nextQuestion() {
    if (currentIndex < currentQuiz.length - 1) {
        currentIndex++;
        renderQuiz();
    } else {
        currentIndex++;
        renderQuiz();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuiz();
    }
}

function reviewQuiz() {
    let html = '';
    currentQuiz.forEach((q, i) => {
        const ua = userAnswers[i];
        let status = '';
        if (q.type === 'single') status = (ua === q.answer) ? '✔' : '✘';
        else status = (Array.isArray(ua) && arraysEqual(ua.sort(), q.answer.sort())) ? '✔' : '✘';
        html += `<div style="margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px;">
            <strong>${i+1}. ${q.question}</strong> <span style="color:${status==='✔'?'var(--success)':'var(--danger)'}">${status}</span><br>
            <span style="color:#aaa;">正确答案：${Array.isArray(q.answer)?q.answer.join('、'):q.answer}</span><br>
            <small>${q.explanation}</small>
        </div>`;
    });
    const area = document.getElementById('quiz-area');
    area.innerHTML = `<h3>答案回顾</h3>${html}<button class="btn mt-3" onclick="startQuiz()">重新出题</button>`;
}

function arraysEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let i=0; i<a.length; i++) if (a[i] !== b[i]) return false;
    return true;
}
